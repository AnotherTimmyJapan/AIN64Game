name: Build N64 ROM
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/dragonminded/libdragon:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ROM
        run: |
          # 1. Locate where libdragon is actually installed
          export N64_INST=$(dirname $(dirname $(find / -name n64.mk -print -quit 2>/dev/null)))
          echo "Found N64_INST at: $N64_INST"
          
          # 2. Build
          mkdir -p build
          make N64_INST=$N64_INST -j$(nproc)

