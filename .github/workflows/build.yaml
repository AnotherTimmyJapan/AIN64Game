name: Build N64 ROM
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/dragonminded/libdragon:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ROM
        run: |
          # Create build directory so the Makefile doesn't complain
          mkdir -p build
          # Explicitly point to the internal toolchain path
          export N64_INST=/n64_toolchain
          make -j$(nproc)
