name: Build N64 ROM
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo dpkg --add-architecture i386
          # Add Focal (20.04) sources for legacy libncurses5
          echo "deb http://security.ubuntu.com/ubuntu focal-security main universe" | sudo tee /etc/apt/sources.list.d/focal-security.list
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-mips-linux-gnu gcc-mips-linux-gnu python3 python3-pip ccache
          # Install legacy libraries
          sudo apt-get install -y libncurses5:i386 libtinfo5:i386

      - name: Cache Tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: tools/
          key: ${{ runner.os }}-n64-tools-${{ hashFiles('tools/setup.sh') }}

      - name: Setup IDO and LibreUltra
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          # 1. Clone and Build IDO Recomp
          git clone --recursive --depth 1 https://github.com/decompals/ido-static-recomp.git tools/ido-recomp
          
          # MANUALLY BUILD RABBITIZER FIRST
          cd tools/ido-recomp/tools/rabbitizer
          make -j$(nproc)
          
          # NOW BUILD IDO
          cd ../..
          make VERSION=5.3 -j$(nproc)
          
          mkdir -p ../ido5.3
          cp -r build/5.3/out/* ../ido5.3/
          cd ../..

          # 2. Clone LibreUltra
          git clone --depth 1 https://github.com/n64decomp/libreultra.git tools/libreultra

      - name: Build ROM
        run: |
          # 1. Create the symlink for headers
          mkdir -p include
          ln -s $(pwd)/tools/libreultra/include/PR include/PR
          
          # 2. Set up Path for IDO
          export PATH=$PATH:$(pwd)/tools/ido5.3
          
          # 3. Run the Build
          make -j$(nproc)


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: n64-rom
          path: build/*.z64
