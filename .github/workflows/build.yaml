name: Build N64 ROM
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/dragonminded/libdragon:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ROM
        run: |
          # The container uses /n64_toolchain as the base
          export N64_INST=/n64_toolchain
          export PATH=$N64_INST/bin:$PATH
          
          mkdir -p build
          # Pass N64_INST directly to make
          make N64_INST=$N64_INST
      
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: n64-rom
          path: "*.z64"
